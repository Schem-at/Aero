services:
  aero:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      # WebTransport (QUIC) — must be exposed directly, can't go through Traefik
      - "4433:4433/udp"
      - "4433:4433/tcp"
      # Minecraft TCP — direct port exposure
      - "25565:25565"
    networks:
      - dokploy-network
    environment:
      - DOMAIN=${DOMAIN:-aeromc.dev}
      - TCP_PORT=25565
      - WT_PORT=4433
      - API_PORT=9090
      - WEB_PORT=80
      - DB_PATH=/data/aero.db
      - ADMIN_USER=${ADMIN_USER:-}
      - ADMIN_PASS=${ADMIN_PASS:-}
      - JWT_SECRET=${JWT_SECRET:-}
    volumes:
      # Persist SQLite database (admin accounts)
      - ../files/data:/data
      # Persist WebTransport TLS certs so cert hash stays stable across restarts
      - ../files/certs:/etc/aero/certs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  dokploy-network:
    external: true
