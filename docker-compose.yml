services:
  aero:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-80}:80"         # Web UI (or let Dokploy/Traefik handle this)
      - "${WT_PORT:-4433}:4433/udp"  # WebTransport (QUIC/UDP)
      - "${WT_PORT:-4433}:4433/tcp"  # WebTransport (TCP fallback)
      - "${TCP_PORT:-25565}:25565"   # Minecraft clients
      - "${API_PORT:-9090}:9090"     # Proxy metrics dashboard
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - TCP_PORT=25565
      - WT_PORT=4433
      - API_PORT=9090
    volumes:
      # Mount TLS certs for WebTransport (optional — generates self-signed if missing)
      - ${CERT_DIR:-./certs}:/etc/aero/certs:ro
    restart: unless-stopped
